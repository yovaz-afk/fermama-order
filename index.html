<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Заявки ФерМама</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #FAF8F5;
      --primary: #C42121;
      --accent: #F47B25;
      --grad: linear-gradient(135deg, #C42121 0%, #F47B25 100%);
      --border-warm: #E7E1DA;
      --secondary: #EDE8E0;
      --shadow-btn: 0 4px 16px -3px rgba(196,33,33,0.35);
    }
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); -webkit-font-smoothing: antialiased; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .btn-grad { background: var(--grad) !important; box-shadow: var(--shadow-btn) !important; }
    .btn-grad:active { transform: scale(0.97); }
    .text-grad { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    // =========================
    // ДАННЫЕ (строго из constants.ts во вложении)
    // =========================
    const MANAGERS = [
      { name: 'Наталья Йошкар-Ола', clients: [] },
      { name: 'Мария Чебоксары', clients: [] }
    ];

    const PRODUCTS = [
      // 6.1 Штучные
      { id: 'p1', name: 'Вареники с картошкой 450 гр', unit: 'шт', price: 145 },
      { id: 'p2', name: 'Вареники с картошкой 900 гр', unit: 'шт', price: 290 },

      { id: 'p7', name: 'Котлеты Пожарские 500 гр', unit: 'шт', price: 230 },
      { id: 'p9', name: 'Котлеты из индейки 500 г', unit: 'шт', price: 300 },
      { id: 'p10', name: 'Котлеты куриные с сырно-сливочной начинкой 500 гр', unit: 'шт', price: 258 },
      { id: 'p11', name: 'Манты по-сибирски 450 гр', unit: 'шт', price: 185 },
      { id: 'p12', name: 'Манты по-сибирски 900 гр', unit: 'шт', price: 370 },

      { id: 'p14', name: 'Пельмени Домашние 450 гр', unit: 'шт', price: 179 },

      { id: 'p22', name: 'Пельмени из филе грудки индейки со слив. маслом 450 гр', unit: 'шт', price: 185 },
      { id: 'p23', name: 'Пельмени из филе грудки индейки со слив. маслом 900 гр', unit: 'шт', price: 370 },
      { id: 'p24', name: 'Подкоголи Домашние 450 гр', unit: 'шт', price: 175 },

      { id: 'p26', name: 'Равиоли 450г', unit: 'шт', price: 263 },

      // 6.2 Весовые (расчёт за кг)
      { id: 'w1', name: 'Вареники с картошкой вес.', unit: 'кг', price: 322 },
      { id: 'w2', name: 'Голубцы ленивые вес.', unit: 'кг', price: 440 },
      { id: 'w3', name: 'Зразы Любительские вес.', unit: 'кг', price: 450 },
      { id: 'w4', name: 'Котлеты Домашние вес.', unit: 'кг', price: 530 },
      { id: 'w5', name: 'Котлеты По-киевски вес.', unit: 'кг', price: 480 },
      { id: 'w6', name: 'Котлеты Пожарские вес.', unit: 'кг', price: 460 },
      { id: 'w8', name: 'Котлеты из индейки вес.', unit: 'кг', price: 600 },
      { id: 'w9', name: 'Котлеты куриные с сырно-сливочной начинкой вес.', unit: 'кг', price: 516 },
      { id: 'w10', name: 'Манты по-сибирски вес.', unit: 'кг', price: 411 },
      { id: 'w11', name: 'Наггетсы Фирменные вес.', unit: 'кг', price: 510 },
      { id: 'w12', name: 'Пельмени Домашние вес.', unit: 'кг', price: 398 },
      { id: 'w13', name: 'Пельмени Куриные вес.', unit: 'кг', price: 353 },
      { id: 'w14', name: 'Пельмени Свинина-Курица вес.', unit: 'кг', price: 356 },
      { id: 'w15', name: 'Пельмени из свинины вес.', unit: 'кг', price: 358 },
      { id: 'w16', name: 'Пельмени из филе грудки индейки со слив. маслом вес.', unit: 'кг', price: 411 },
      { id: 'w17', name: 'Подкоголи Домашние вес.', unit: 'кг', price: 389 },
      { id: 'w18', name: 'Равиоли вес.', unit: 'кг', price: 583 },
      { id: 'w19', name: 'Фрикадельки Любимые вес.', unit: 'кг', price: 398 },
      { id: 'w20', name: 'Чебуреки по-домашнему вес.', unit: 'кг', price: 458 },
      { id: 'w21', name: 'Чебуреки с курицей вес.', unit: 'кг', price: 380 },
      { id: 'w23', name: 'Сырники вес.', unit: 'кг', price: 540 },

      // 6.3 Весовые (изначально в прайсе)
      { id: 'wo1', name: 'Голубцы с мясом и рисом вес.', unit: 'кг', price: 339 },
      { id: 'wo2', name: 'Колбаски Гриль с сыром вес.', unit: 'кг', price: 450 },
      { id: 'wo3', name: 'Колбаски куриные из филе грудки вес.', unit: 'кг', price: 416 },
      { id: 'wo4', name: 'Фарш из филе куриной грудки вес.', unit: 'кг', price: 465 },
      { id: 'wo5', name: 'Фарш Свинина-говядина вес.', unit: 'кг', price: 499 },
      { id: 'wo6', name: 'Фарш Свиной вес.', unit: 'кг', price: 395 }
    ];

    // Хиты продаж
    const HIT_IDS = new Set(['p6','w5','p7','w6','p13','w11','p15','w12','p19','w14','wo3']);

    // =========================
    // СОРТИРОВКА (строго как в App.tsx)
    // =========================
    const getBaseName = (name) => name.replace(/\s*(?:(?:\d+\s*(?:гр|г|г))|вес\.)\s*$/i, '').trim();
    const getWeightInGram = (name) => {
      const match = name.match(/(\d+)\s*(?:гр|г|г)/i);
      return match ? parseInt(match[1], 10) : Infinity;
    };

    const SORTED_PRODUCTS = [...PRODUCTS].sort((a, b) => {
      const baseA = getBaseName(a.name);
      const baseB = getBaseName(b.name);
      if (baseA !== baseB) return baseA.localeCompare(baseB, 'ru');
      if (a.unit === 'шт' && b.unit === 'кг') return -1;
      if (a.unit === 'кг' && b.unit === 'шт') return 1;
      if (a.unit === 'шт' && b.unit === 'шт') return getWeightInGram(a.name) - getWeightInGram(b.name);
      return 0;
    });

    // =========================
    // ИКОНКИ (SVG)
    // =========================
    function iconSvg(name, size, extraClass) {
      const s = size || 18;
      const cls = extraClass ? extraClass : '';
      const common = `width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="${cls}"`;
      const stroke = 'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';

      switch (name) {
        case 'plus':
          return `<svg ${common}><path ${stroke} d="M12 5v14M5 12h14"/></svg>`;
        case 'trash':
          return `<svg ${common}><path ${stroke} d="M3 6h18"/><path ${stroke} d="M8 6V4h8v2"/><path ${stroke} d="M19 6l-1 14H6L5 6"/><path ${stroke} d="M10 11v6"/><path ${stroke} d="M14 11v6"/></svg>`;
        case 'alert':
          return `<svg ${common}><path ${stroke} d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path ${stroke} d="M12 9v4"/><path ${stroke} d="M12 17h.01"/></svg>`;
        case 'check':
          return `<svg ${common}><path ${stroke} d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path ${stroke} d="M22 4L12 14.01l-3-3"/></svg>`;
        case 'chevronDown':
          return `<svg ${common}><path ${stroke} d="M6 9l6 6 6-6"/></svg>`;
        case 'user':
          return `<svg ${common}><path ${stroke} d="M20 21a8 8 0 0 0-16 0"/><circle ${stroke} cx="12" cy="7" r="4"/></svg>`;
        case 'store':
          return `<svg ${common}><path ${stroke} d="M3 9l1-5h16l1 5"/><path ${stroke} d="M5 9v12h14V9"/><path ${stroke} d="M9 21v-8h6v8"/></svg>`;
        case 'calendar':
          return `<svg ${common}><rect ${stroke} x="3" y="4" width="18" height="18" rx="2"/><path ${stroke} d="M16 2v4M8 2v4M3 10h18"/></svg>`;
        case 'copy':
          return `<svg ${common}><rect ${stroke} x="9" y="9" width="13" height="13" rx="2"/><path ${stroke} d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        case 'rotateCcw':
          return `<svg ${common}><path ${stroke} d="M3 2v6h6"/><path ${stroke} d="M3 8a9 9 0 1 0 2.64-6.36L3 8z"/></svg>`;
        case 'messageSquare':
          return `<svg ${common}><path ${stroke} d="M21 15a4 4 0 0 1-4 4H7l-4 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>`;
        case 'share':
          return `<svg ${common}><path ${stroke} d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path ${stroke} d="M16 6l-4-4-4 4"/><path ${stroke} d="M12 2v13"/></svg>`;
        case 'tg':
          return `<svg ${common}><path ${stroke} d="M22 2L11 13"/><path ${stroke} d="M22 2L15 22l-4-9-9-4 20-7z"/></svg>`;
        case 'wa':
          return `<svg ${common}><path ${stroke} d="M20 12a8 8 0 1 1-3.2-6.4"/><path ${stroke} d="M8.5 9.5c1.2 2.3 3.7 4.6 6 5.2"/><path ${stroke} d="M15.5 15.5l-1.7.7a1 1 0 0 1-1-.2l-1.2-.9"/><path ${stroke} d="M9 8.7l.7-1.7a1 1 0 0 1 .8-.6h.3"/></svg>`;
        case 'vb':
          return `<svg ${common}><path ${stroke} d="M21 11.5c0 5-4.4 9-9.8 9-1.2 0-2.4-.2-3.5-.6L3 21l1.3-4.2c-.5-1-.8-2.1-.8-3.3 0-5 4.4-9 9.8-9S21 6.5 21 11.5z"/></svg>`;
        default:
          return '';
      }
    }

    // =========================
    // СОСТОЯНИЕ
    // =========================
    const state = {
      selectedManager: '',
      clientName: '',
      orderDate: new Date().toISOString().split('T')[0],
      orderComment: '',
      orderItems: [], // {id, productId, quantity, qtyText}
      status: null, // {type:'success'|'error', msg:string}
      viewMode: 'rows' // 'rows' | 'matrix'
    };

    // =========================
    // УТИЛИТЫ
    // =========================
    function uid() { return Math.random().toString(36).substr(2, 9); }
    function productById(id) { return PRODUCTS.find(p => p.id === id) || null; }
    function formatRuMoney(n) { return Number(n || 0).toLocaleString('ru-RU'); }

    function totalSum() {
      return state.orderItems.reduce((acc, item) => {
        const p = productById(item.productId);
        return p ? acc + (Number(item.quantity || 0) * p.price) : acc;
      }, 0);
    }

    function validItems() { return state.orderItems.filter(i => i.productId !== ''); }

    // =========================
    // ✅ ТЕКСТ СООБЩЕНИЯ (ИСПРАВЛЕНО)
    // - жирный: только "Товар — N ед."
    // - цена и сумма возвращены
    // - формат жирного разный для WA/Viber и Telegram
    // =========================
    function generateMessageText(target) {
      const dateFormatted = new Date(state.orderDate).toLocaleDateString('ru-RU');
      const clientLine = String(state.clientName || '').trim() || 'Не указан';

      const isTelegram = target === 'telegram';
      const isWhatsApp = target === 'whatsapp';
      const isViber = target === 'viber';

      // WhatsApp / Viber часто понимают *жирный*, Telegram понимает **жирный**
      const bOpen = (isWhatsApp || isViber) ? '*' : (isTelegram ? '**' : '');
      const bClose = (isWhatsApp || isViber) ? '*' : (isTelegram ? '**' : '');

      let text = `ЗАЯВКА\n${clientLine}\n\n`;
      text += `Менеджер: ${state.selectedManager}\n`;
      text += `Дата: ${dateFormatted}\n\n`;

      const v = validItems();
      if (v.length > 0) {
        text += `Список позиций:\n`;
        v.forEach((item, index) => {
          const p = productById(item.productId);
          if (p) {
            const sum = Number(item.quantity || 0) * p.price;

            const boldPart = `${p.name} — ${item.quantity} ${p.unit}`;
            // ✅ Жирный только "товар — количество", дальше цена и сумма обычным
            if (bOpen) {
              text += `${index + 1}) ${bOpen}${boldPart}${bClose} × ${p.price} ₽ = ${formatRuMoney(sum)} ₽\n`;
            } else {
              // для share (если куда-то не поддерживает форматирование) — без жирного
              text += `${index + 1}) ${boldPart} × ${p.price} ₽ = ${formatRuMoney(sum)} ₽\n`;
            }
          }
        });
      }

      if (String(state.orderComment || '').trim()) {
        text += `\nКомментарий: ${String(state.orderComment).trim()}\n`;
      }

      text += `\nИтого: ${formatRuMoney(totalSum())} ₽`;
      return text;
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setStatus(type, msg) {
      state.status = { type, msg };
      renderStatusOnly();
      if (type === 'success') {
        setTimeout(() => {
          state.status = null;
          renderStatusOnly();
        }, 3000);
      }
    }

    // =========================
    // МЕССЕНДЖЕРЫ (кнопка "Отправить")
    // =========================
    function openMessenger(kind) {
      if (!state.selectedManager) {
        setStatus('error', 'Выберите менеджера');
        document.getElementById('managerSelect')?.focus();
        return;
      }
      if (!String(state.clientName || '').trim()) {
        setStatus('error', 'Укажите название клиента');
        document.getElementById('clientField')?.focus();
        return;
      }
      if (state.orderItems.length === 0 || state.orderItems.every(i => !i.productId)) {
        setStatus('error', 'Добавьте товары в заявку');
        return;
      }

      // ✅ теперь текст зависит от мессенджера
      const text = generateMessageText(kind);

      if (kind === 'share') {
        if (navigator.share) {
          navigator.share({ text }).catch(() => {
            // пользователь закрыл шторку — ничего не делаем
          });
        } else {
          // нет Web Share API (десктоп) — копируем в буфер
          navigator.clipboard.writeText(text).then(() => {
            setStatus('success', 'Текст скопирован — вставьте в нужный мессенджер');
          }).catch(() => {
            setStatus('error', 'Поделиться недоступно — скопируйте текст кнопкой слева');
          });
        }
        return;
      }

      const encoded = encodeURIComponent(text);

      if (kind === 'telegram') {
        const appUrl = encodeURIComponent(window.location.href);
        window.open(`https://t.me/share/url?url=${appUrl}&text=${encoded}`, '_blank');
        return;
      }

      if (kind === 'whatsapp') {
        window.open(`https://wa.me/?text=${encoded}`, '_blank');
        return;
      }

      if (kind === 'viber') {
        window.open(`viber://forward?text=${encoded}`, '_blank');
        return;
      }
    }

    // =========================
    // ДЕЙСТВИЯ
    // =========================
    function addRow() {
      const item = { id: uid(), productId: '', quantity: 0, qtyText: '' };
      state.orderItems.push(item);
      appendRowToDom(item);
      updateFooterTotals();
      updateHeaderResetVisibility();
      updateSelectedCount();
    }

    function removeRow(id) {
      state.orderItems = state.orderItems.filter(x => x.id !== id);
      const el = document.getElementById(`row-${id}`);
      if (el) el.remove();
      updateFooterTotals();
      updateHeaderResetVisibility();
      updateSelectedCount();
    }

    async function handleCopy() {
      if (state.orderItems.length === 0) return;

      // ✅ для копирования делаю "share"-версию (без риска, что мессенджер покажет **)
      const text = generateMessageText('share');

      try {
        await navigator.clipboard.writeText(text);
        setStatus('success', 'Текст скопирован');
      } catch (e) {
        setStatus('error', 'Не удалось скопировать');
      }
    }

    function handleReset() {
      state.orderItems = [];
      state.orderComment = '';
      state.clientName = '';
      state.selectedManager = '';
      state.status = null;

      const list = document.getElementById('rows');
      if (list) list.innerHTML = '';

      const c = document.getElementById('clientField');
      if (c) c.value = '';
      const com = document.getElementById('commentField');
      if (com) com.value = '';
      const mgr = document.getElementById('managerSelect');
      if (mgr) mgr.value = '';

      if (state.viewMode === 'matrix') renderMatrix();

      updateFooterTotals();
      updateHeaderResetVisibility();
      updateSelectedCount();
      setStatus('success', 'Заявка очищена');
    }

    // =========================
    // ORDER MATRIX
    // =========================
    function renderMatrix() {
      const container = document.getElementById('matrixContainer');
      if (!container) return;

      const searchVal = (document.getElementById('matrixSearch')?.value || '').toLowerCase().trim();
      const products = searchVal
        ? SORTED_PRODUCTS.filter(p => p.name.toLowerCase().includes(searchVal))
        : SORTED_PRODUCTS;

      const rowsHtml = products.map(p => {
        const ri = state.orderItems.find(i => i.productId === p.id);
        const qty = ri ? (ri.qtyText || '') : '';
        const hasQty = qty && parseFloat(qty) > 0;
        const sum = hasQty ? formatRuMoney((parseFloat(qty) || 0) * p.price) : '';
        return `
          <div class="flex items-center gap-2 px-3 py-2.5 border-b border-slate-50 last:border-0 ${hasQty ? 'bg-green-50/60' : ''}" data-mrow="${p.id}">
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium text-slate-700 leading-snug">${HIT_IDS.has(p.id) ? '🔥 ' : ''}${escapeHtml(p.name)}</div>
              <div class="text-xs text-slate-400 mt-0.5" data-mmeta>${p.price}\u00a0₽\u00a0/\u00a0${p.unit}${hasQty ? ` · <span class="text-green-600 font-semibold">${sum} ₽</span>` : ''}</div>
            </div>
            <div class="flex items-center gap-1 flex-shrink-0">
              <button type="button" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 flex items-center justify-center font-bold text-base text-slate-600 active:scale-90 transition-all select-none" data-mminus="${p.id}">−</button>
              <input
                type="text"
                inputmode="${p.unit === 'кг' ? 'decimal' : 'numeric'}"
                placeholder="—"
                value="${escapeHtml(qty)}"
                class="w-14 text-sm font-bold text-center rounded-lg px-1 py-1.5 border focus:outline-none focus:border-green-500 transition-colors ${hasQty ? 'bg-white border-green-400 text-green-700' : 'bg-slate-50 border-slate-200 text-slate-500'}"
                data-mqty="${p.id}"
              />
              <button type="button" class="w-8 h-8 rounded-lg ${hasQty ? 'bg-green-100 hover:bg-green-200 text-green-700' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'} flex items-center justify-center font-bold text-base active:scale-90 transition-all select-none" data-mplus="${p.id}">+</button>
            </div>
          </div>`;
      }).join('');

      container.innerHTML = `
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <div class="p-3 bg-white border-b border-slate-100 sticky top-0 z-10">
            <input
              id="matrixSearch"
              type="text"
              placeholder="Фильтр по каталогу..."
              value="${escapeHtml(searchVal)}"
              class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-green-500 transition-colors"
            />
          </div>
          <div>${rowsHtml || '<p class="text-sm text-slate-400 text-center py-6">Ничего не найдено</p>'}</div>
        </div>
      `;

      document.getElementById('matrixSearch').addEventListener('input', renderMatrix);

      container.querySelectorAll('[data-mqty]').forEach(inp => {
        const pid = inp.getAttribute('data-mqty');
        inp.addEventListener('input', (e) => {
          updateMatrixQtyState(pid, e.target.value);
          partialMatrixRowUpdate(pid, true);
          updateFooterTotals();
          updateSelectedCount();
          updateHeaderResetVisibility();
        });
        inp.addEventListener('blur', (e) => {
          updateMatrixQtyState(pid, e.target.value);
          partialMatrixRowUpdate(pid, false);
          updateFooterTotals();
          updateSelectedCount();
          updateHeaderResetVisibility();
        });
      });

      container.querySelectorAll('[data-mplus]').forEach(btn => {
        const pid = btn.getAttribute('data-mplus');
        btn.addEventListener('click', () => {
          const p = productById(pid);
          const ri = state.orderItems.find(i => i.productId === pid);
          const step = p?.unit === 'кг' ? 0.5 : 1;
          const cur = ri ? (parseFloat(ri.qtyText) || 0) : 0;
          updateMatrixQtyState(pid, String(+(cur + step).toFixed(2)));
          partialMatrixRowUpdate(pid, false);
          updateFooterTotals();
          updateSelectedCount();
          updateHeaderResetVisibility();
        });
      });

      container.querySelectorAll('[data-mminus]').forEach(btn => {
        const pid = btn.getAttribute('data-mminus');
        btn.addEventListener('click', () => {
          const p = productById(pid);
          const ri = state.orderItems.find(i => i.productId === pid);
          const step = p?.unit === 'кг' ? 0.5 : 1;
          const cur = ri ? (parseFloat(ri.qtyText) || 0) : 0;
          const next = Math.max(0, +(cur - step).toFixed(2));
          updateMatrixQtyState(pid, next > 0 ? String(next) : '');
          partialMatrixRowUpdate(pid, false);
          updateFooterTotals();
          updateSelectedCount();
          updateHeaderResetVisibility();
        });
      });
    }

    function updateMatrixQtyState(pid, valStr) {
      const p = productById(pid);
      if (!p) return;
      valStr = String(valStr || '').replace(',', '.').trim();
      const parsed = parseFloat(valStr);
      const isZero = !valStr || isNaN(parsed) || parsed <= 0;
      let ri = state.orderItems.find(i => i.productId === pid);
      if (isZero) {
        if (ri) state.orderItems = state.orderItems.filter(i => i.productId !== pid);
      } else {
        const qty = p.unit === 'шт' ? Math.floor(parsed) : parsed;
        const qtyText = String(p.unit === 'шт' ? qty : parsed);
        if (ri) { ri.qtyText = qtyText; ri.quantity = qty; }
        else state.orderItems.push({ id: uid(), productId: pid, quantity: qty, qtyText });
      }
    }

    function partialMatrixRowUpdate(pid, preserveInput) {
      const p = productById(pid);
      if (!p) return;
      const ri = state.orderItems.find(i => i.productId === pid);
      const hasQty = ri && parseFloat(ri.qtyText) > 0;
      const row = document.querySelector(`[data-mrow="${pid}"]`);
      if (!row) return;

      if (hasQty) row.classList.add('bg-green-50/60');
      else row.classList.remove('bg-green-50/60');

      const meta = row.querySelector('[data-mmeta]');
      if (meta) {
        const sum = hasQty ? formatRuMoney((parseFloat(ri.qtyText) || 0) * p.price) : '';
        meta.innerHTML = `${p.price}\u00a0₽\u00a0/\u00a0${p.unit}${hasQty ? ` · <span class="text-green-600 font-semibold">${sum} ₽</span>` : ''}`;
      }

      if (!preserveInput) {
        const inp = row.querySelector(`[data-mqty="${pid}"]`);
        if (inp) {
          inp.value = ri ? (ri.qtyText || '') : '';
          inp.className = `w-14 text-sm font-bold text-center rounded-lg px-1 py-1.5 border focus:outline-none focus:border-green-500 transition-colors ${hasQty ? 'bg-white border-green-400 text-green-700' : 'bg-slate-50 border-slate-200 text-slate-500'}`;
        }
        const plusBtn = row.querySelector(`[data-mplus="${pid}"]`);
        if (plusBtn) plusBtn.className = `w-8 h-8 rounded-lg ${hasQty ? 'bg-green-100 hover:bg-green-200 text-green-700' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'} flex items-center justify-center font-bold text-base active:scale-90 transition-all select-none`;
      }
    }

    function switchViewMode(mode) {
      state.viewMode = mode;
      const rowsSection = document.getElementById('rowsSection');
      const matrixSection = document.getElementById('matrixSection');
      const btnRows = document.getElementById('viewBtnRows');
      const btnMatrix = document.getElementById('viewBtnMatrix');

      if (mode === 'rows') {
        rowsSection.classList.remove('hidden');
        matrixSection.classList.add('hidden');
        btnRows.classList.add('bg-white', 'shadow-sm', 'text-slate-700');
        btnRows.classList.remove('text-slate-400');
        btnMatrix.classList.remove('bg-white', 'shadow-sm', 'text-slate-700');
        btnMatrix.classList.add('text-slate-400');
        // Rebuild DOM rows from state
        const list = document.getElementById('rows');
        if (list) { list.innerHTML = ''; state.orderItems.forEach(i => appendRowToDom(i)); }
      } else {
        rowsSection.classList.add('hidden');
        matrixSection.classList.remove('hidden');
        btnMatrix.classList.add('bg-white', 'shadow-sm', 'text-slate-700');
        btnMatrix.classList.remove('text-slate-400');
        btnRows.classList.remove('bg-white', 'shadow-sm', 'text-slate-700');
        btnRows.classList.add('text-slate-400');
        renderMatrix();
      }
    }

    // =========================

    function appendRowToDom(item) {
      const rows = document.getElementById('rows');
      const el = document.createElement('div');
      el.id = `row-${item.id}`;
      el.className = 'bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-3';

      const sp = item.productId ? productById(item.productId) : null;

      el.innerHTML = `
        <div class="flex justify-between items-start gap-2">
          <div class="flex-1 min-w-0">
            <label class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">Товар</label>
            <button type="button" class="w-full text-left flex items-center justify-between gap-1 py-0.5" data-row="searchTrigger">
              <span data-row="searchTriggerText" class="text-sm font-semibold leading-tight truncate ${sp ? 'text-slate-800' : 'text-slate-400'}">
                ${sp ? escapeHtml(sp.name) : 'Выберите товар...'}
              </span>
              ${iconSvg('chevronDown', 14, 'text-slate-300 flex-shrink-0')}
            </button>
            <div data-row="searchDropdown" class="hidden mt-2 border border-slate-200 rounded-xl overflow-hidden shadow-lg bg-white">
              <div class="p-2 bg-slate-50 border-b border-slate-100">
                <input type="text" placeholder="Поиск товара..." autocomplete="off"
                  class="w-full bg-white rounded-lg px-3 py-2 text-sm border border-slate-200 focus:outline-none focus:border-green-500"
                  data-row="searchInput" />
              </div>
              <div data-row="searchList" class="max-h-52 overflow-y-auto divide-y divide-slate-50"></div>
            </div>
          </div>
          <button class="text-slate-300 hover:text-red-500 p-1 mt-4 transition-colors flex-shrink-0" type="button" data-row="remove">
            ${iconSvg('trash', 18)}
          </button>
        </div>

        <div class="grid grid-cols-3 gap-3 border-t border-slate-50 pt-3">
          <div>
            <label class="text-[9px] text-slate-400 font-bold uppercase mb-1 block">Цена</label>
            <div class="text-sm font-medium text-slate-500" data-row="price">${sp ? `${sp.price}₽/${sp.unit}` : '—'}</div>
          </div>
          <div>
            <label class="text-[9px] text-slate-400 font-bold uppercase mb-1 block">Кол-во</label>
            <div class="flex items-center gap-1">
              <button type="button" data-row="minus" class="w-7 h-7 rounded-md flex items-center justify-center font-bold text-base select-none transition-all ${sp ? 'bg-slate-100 hover:bg-slate-200 text-slate-600 active:scale-95' : 'bg-slate-50 text-slate-300 pointer-events-none'}">−</button>
              <input type="text" inputmode="${sp?.unit === 'кг' ? 'decimal' : 'numeric'}" placeholder="0" value="${item.qtyText || ''}"
                class="w-full min-w-0 text-sm font-bold text-center rounded-md px-1 py-1 border focus:outline-none focus:border-green-500 transition-colors ${sp ? 'bg-slate-50 border-slate-200 text-slate-800' : 'bg-slate-50 border-slate-100 text-slate-300 pointer-events-none'}"
                data-row="qty" ${!sp ? 'disabled' : ''} />
              <button type="button" data-row="plus" class="w-7 h-7 rounded-md flex items-center justify-center font-bold text-base select-none transition-all ${sp ? 'bg-slate-100 hover:bg-slate-200 text-slate-600 active:scale-95' : 'bg-slate-50 text-slate-300 pointer-events-none'}">+</button>
            </div>
          </div>
          <div class="text-right">
            <label class="text-[9px] text-slate-400 font-bold uppercase mb-1 block">Сумма</label>
            <div class="text-sm font-bold text-green-600" data-row="sum">0 ₽</div>
          </div>
        </div>
      `;

      rows.appendChild(el);

      const trigger     = el.querySelector('[data-row="searchTrigger"]');
      const triggerText = el.querySelector('[data-row="searchTriggerText"]');
      const dropdown    = el.querySelector('[data-row="searchDropdown"]');
      const searchInput = el.querySelector('[data-row="searchInput"]');
      const searchList  = el.querySelector('[data-row="searchList"]');
      const btnRemove   = el.querySelector('[data-row="remove"]');
      const qtyInput    = el.querySelector('[data-row="qty"]');
      const btnMinus    = el.querySelector('[data-row="minus"]');
      const btnPlus     = el.querySelector('[data-row="plus"]');
      const priceBox    = el.querySelector('[data-row="price"]');

      function fillList(query) {
        const q = (query || '').toLowerCase().trim();
        const list = q ? SORTED_PRODUCTS.filter(p => p.name.toLowerCase().includes(q)) : SORTED_PRODUCTS;
        searchList.innerHTML = list.length
          ? list.map(p => `
              <div class="flex items-center justify-between gap-3 px-3 py-2.5 hover:bg-green-50 active:bg-green-100 cursor-pointer" data-pid="${p.id}">
                <span class="text-sm text-slate-700 leading-tight">${HIT_IDS.has(p.id) ? '🔥 ' : ''}${escapeHtml(p.name)}</span>
                <span class="text-xs text-slate-400 whitespace-nowrap">${p.price}₽/${p.unit}</span>
              </div>`).join('')
          : '<p class="text-sm text-slate-400 text-center py-4">Не найдено</p>';
      }

      function openDropdown() {
        document.querySelectorAll('[data-row="searchDropdown"]').forEach(d => {
          if (d !== dropdown) d.classList.add('hidden');
        });
        dropdown.classList.remove('hidden');
        searchInput.value = '';
        fillList('');
        setTimeout(() => searchInput.focus(), 30);
      }

      function closeDropdown() { dropdown.classList.add('hidden'); }

      function activateControls(p) {
        qtyInput.disabled = false;
        qtyInput.inputMode = p.unit === 'кг' ? 'decimal' : 'numeric';
        qtyInput.classList.remove('border-slate-100', 'text-slate-300', 'pointer-events-none');
        qtyInput.classList.add('border-slate-200', 'text-slate-800');
        [btnMinus, btnPlus].forEach(b => {
          b.classList.remove('bg-slate-50', 'text-slate-300', 'pointer-events-none');
          b.classList.add('bg-slate-100', 'hover:bg-slate-200', 'text-slate-600', 'active:scale-95');
        });
      }

      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.contains('hidden') ? openDropdown() : closeDropdown();
      });
      dropdown.addEventListener('click', (e) => e.stopPropagation());
      searchInput.addEventListener('input', (e) => fillList(e.target.value));

      searchList.addEventListener('click', (e) => {
        const target = e.target.closest('[data-pid]');
        if (!target) return;
        const pid = target.getAttribute('data-pid');
        const p = productById(pid);
        const rowItem = state.orderItems.find(x => x.id === item.id);
        if (!p || !rowItem) return;

        rowItem.productId = pid;
        rowItem.quantity = p.unit === 'кг' ? 1.0 : 1;
        rowItem.qtyText = String(rowItem.quantity);

        triggerText.textContent = p.name;
        triggerText.classList.remove('text-slate-400');
        triggerText.classList.add('text-slate-800');
        qtyInput.value = rowItem.qtyText;
        priceBox.textContent = `${p.price}₽/${p.unit}`;
        activateControls(p);
        closeDropdown();
        updateRowSum(item.id);
        updateFooterTotals();
        updateHeaderResetVisibility();
        updateSelectedCount();
      });

      btnRemove.addEventListener('click', () => removeRow(item.id));

      function adjustQty(delta) {
        const rowItem = state.orderItems.find(x => x.id === item.id);
        if (!rowItem?.productId) return;
        const p = productById(rowItem.productId);
        if (!p) return;
        const step = p.unit === 'кг' ? 0.5 : 1;
        let next = Math.max(0, +(((parseFloat(rowItem.qtyText) || 0) + delta * step).toFixed(2)));
        if (p.unit === 'шт') next = Math.round(next);
        rowItem.quantity = next;
        rowItem.qtyText = String(next);
        qtyInput.value = rowItem.qtyText;
        updateRowSum(item.id);
        updateFooterTotals();
        updateHeaderResetVisibility();
      }

      btnMinus.addEventListener('click', () => adjustQty(-1));
      btnPlus.addEventListener('click', () => adjustQty(1));

      qtyInput.addEventListener('input', (e) => {
        const rowItem = state.orderItems.find(x => x.id === item.id);
        if (!rowItem) return;
        const p = productById(rowItem.productId);
        let valStr = String(e.target.value || '').replace(',', '.');
        if (valStr !== '' && !/^\d*\.?\d*$/.test(valStr)) {
          e.target.value = rowItem.qtyText || '';
          return;
        }
        rowItem.qtyText = valStr;
        const num = isNaN(parseFloat(valStr)) ? 0 : parseFloat(valStr);
        rowItem.quantity = p?.unit === 'шт' ? Math.floor(num) : num;
        updateRowSum(item.id);
        updateFooterTotals();
        updateHeaderResetVisibility();
      });

      updateRowSum(item.id);
    }

    function updateRowMeta(rowId) {
      const item = state.orderItems.find(x => x.id === rowId);
      if (!item) return;

      const row = document.getElementById(`row-${rowId}`);
      if (!row) return;

      const p = productById(item.productId);
      const priceBox = row.querySelector('[data-row="price"]');
      const qtyInput = row.querySelector('[data-row="qty"]');

      if (p) {
        priceBox.textContent = `${p.price}₽ / ${p.unit}`;
        qtyInput.disabled = false;
      } else {
        priceBox.textContent = '—';
        qtyInput.disabled = true;
      }
    }

    function updateRowSum(rowId) {
      const item = state.orderItems.find(x => x.id === rowId);
      if (!item) return;

      const row = document.getElementById(`row-${rowId}`);
      if (!row) return;

      const p = productById(item.productId);
      const sumBox = row.querySelector('[data-row="sum"]');

      const sum = p ? (Number(item.quantity || 0) * p.price) : 0;
      sumBox.textContent = `${formatRuMoney(sum)} ₽`;
    }

    // =========================
    // UI: статус/итоги/счётчик/кнопка очистить
    // =========================
    function renderStatusOnly() {
      const box = document.getElementById('statusBox');
      if (!box) return;

      if (!state.status) {
        box.innerHTML = '';
        return;
      }

      box.innerHTML = `
        <div class="flex items-center gap-3 p-4 rounded-xl border animate-in fade-in slide-in-from-top-2 duration-300 ${
          state.status.type === 'success'
            ? 'bg-green-50 border-green-100 text-green-700'
            : 'bg-red-50 border-red-100 text-red-700'
        }">
          ${state.status.type === 'success' ? iconSvg('check', 18) : iconSvg('alert', 18)}
          <span class="text-sm font-medium">${escapeHtml(state.status.msg)}</span>
        </div>
      `;
    }

    function updateFooterTotals() {
      const el = document.getElementById('totalSum');
      if (!el) return;
      el.textContent = formatRuMoney(totalSum());
    }

    function updateSelectedCount() {
      const el = document.getElementById('selectedCount');
      if (!el) return;
      const selectedCount = state.orderItems.filter(i => i.productId).length;
      el.textContent = `${selectedCount} ПОЗ.`;
    }

    function updateHeaderResetVisibility() {
      const btn = document.getElementById('resetBtn');
      if (!btn) return;
      const show = (state.orderItems.length > 0 || String(state.clientName || '').trim() || String(state.orderComment || '').trim());
      btn.classList.toggle('hidden', !show);
    }

    // =========================
    // СОБЫТИЯ (каркас)
    // =========================
    function bindStaticEvents() {
      const managerSelect = document.getElementById('managerSelect');
      managerSelect.addEventListener('change', (e) => {
        state.selectedManager = e.target.value;
      });

      const clientField = document.getElementById('clientField');
      clientField.addEventListener('input', (e) => {
        state.clientName = e.target.value;
        updateHeaderResetVisibility();
      });

      const dateField = document.getElementById('dateField');
      dateField.value = state.orderDate;
      dateField.addEventListener('change', (e) => {
        state.orderDate = e.target.value;
      });

      const commentField = document.getElementById('commentField');
      commentField.addEventListener('input', (e) => {
        state.orderComment = e.target.value;
        updateHeaderResetVisibility();
      });

      document.getElementById('addRowBtn').addEventListener('click', addRow);
      document.getElementById('copyBtn').addEventListener('click', handleCopy);
      document.getElementById('resetBtn').addEventListener('click', handleReset);
      document.getElementById('viewBtnRows').addEventListener('click', () => switchViewMode('rows'));
      document.getElementById('viewBtnMatrix').addEventListener('click', () => switchViewMode('matrix'));

      const sendBtn = document.getElementById('sendBtn');

      sendBtn.addEventListener('click', () => {
        openMessenger('share');
      });

      document.addEventListener('click', () => {
        // Close search dropdowns
        document.querySelectorAll('[data-row="searchDropdown"]').forEach(d => d.classList.add('hidden'));
      });
    }

    // =========================
    // Старт
    // =========================
    render();
  </script>
</body>
</html>
